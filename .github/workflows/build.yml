name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Whisper binaries
        run: |
          mkdir -p app/src/main/assets/whisper
          cd app/src/main/assets/whisper

          # Download whisper-cli pre-compiled for ARM64
          curl -L -o ggml-tiny.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin"

          # Build whisper.cpp for Android ARM64
          sudo apt-get install -y cmake clang
          cd /tmp
          git clone https://github.com/ggerganov/whisper.cpp --depth 1
          cd whisper.cpp
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk)/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26
          make -j4

          cp bin/whisper-cli $GITHUB_WORKSPACE/app/src/main/assets/whisper/
          cp src/libwhisper.so $GITHUB_WORKSPACE/app/src/main/assets/whisper/
          cp ggml/src/libggml.so $GITHUB_WORKSPACE/app/src/main/assets/whisper/
          cp ggml/src/libggml-base.so $GITHUB_WORKSPACE/app/src/main/assets/whisper/
          cp ggml/src/libggml-cpu.so $GITHUB_WORKSPACE/app/src/main/assets/whisper/

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
